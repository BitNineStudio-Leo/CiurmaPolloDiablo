<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ciurma — Pollo Diablo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1712">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07060400;--surf:#16120d;--surf2:#1e1810;--surf3:#261e13;
  --gold:#d4a84b;--gold2:#f0c96a;--gold-dim:#8a6820;
  --red:#8b2020;--red2:#e04040;--teal:#2ab8b0;
  --amber:#c47a20;--amber2:#f0a040;
  --green2:#2a5a2a;--green3:#5ab85a;
  --txt:#ede5cc;--muted:#7a6e58;--muted2:#5a5040;
  --bord:#2e2418;--bord2:#3e3020;--bord3:#4e3e28;
  --r:12px;--rs:8px;--r2:16px;--nav-h:58px;
  --font-display:'Cinzel',Georgia,serif;
  --font-body:'Crimson Pro',Georgia,serif;
  /* Grain overlay — noise texture CSS */
  --grain:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  background:#07060400;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% 0%, #1a130800 0%, #07060400 70%),
    linear-gradient(180deg, #0d0a05 0%, #070604 100%);
  background-color:#070604;
  color:var(--txt);
  font-family:var(--font-body);
  font-size:16px;
  height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
}

#app{height:100dvh;overflow:hidden}
#modals{position:fixed;inset:0;pointer-events:none;z-index:99}
#modals>*{pointer-events:auto}

.view{height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:transparent}
.view.textured{
  background:url('https://iltesorodelcuorenero.wordpress.com/wp-content/uploads/2017/05/temp.jpg') center/cover fixed;
}
.view.textured::before{
  content:'';position:fixed;inset:0;
  background:rgba(7,6,4,.86);
  pointer-events:none;z-index:0
}
.view.textured>*{position:relative;z-index:1}

/* ── Header ── */
.hdr{
  background:linear-gradient(180deg, #1e1810 0%, #16120d 100%);
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--bord2);
  flex-shrink:0;min-height:54px;
  box-shadow:0 2px 12px rgba(0,0,0,.6);
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--gold-dim) 30%,var(--gold-dim) 70%,transparent 100%);
}
.logo{font-family:var(--font-display);color:var(--gold);font-size:17px;flex:1;letter-spacing:.8px}
.hdr-title{font-family:var(--font-display);color:var(--gold);font-size:15px;flex:1;letter-spacing:.5px}
.ico-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:6px;border-radius:6px}
.ico-btn:active{background:var(--surf2)}
.confirm-btn{background:var(--gold);color:#0d0a03;border:none;border-radius:var(--rs);padding:7px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-display);letter-spacing:.3px}
.end-btn{background:transparent;color:var(--muted);border:1px solid var(--bord2);border-radius:var(--rs);font-size:12px;padding:5px 10px;cursor:pointer;font-family:var(--font-display);letter-spacing:.3px}

/* ── Session header ── */
.sess-hdr{justify-content:space-between;padding:10px 14px;gap:8px}
.pool-wrap{display:flex;flex-direction:column;gap:4px}
.pool-dots{display:flex;gap:6px;flex-wrap:wrap;max-width:160px}
.pd{width:14px;height:14px;border-radius:50%;flex-shrink:0;transition:all .2s}
.pd-on{
  background:radial-gradient(circle at 35% 35%, var(--gold2), var(--gold));
  box-shadow:0 0 6px rgba(212,168,75,.5);
}
.pd-off{background:var(--surf3);border:1px solid var(--bord2)}
.pool-txt{font-size:11px;color:var(--muted);font-family:var(--font-display);letter-spacing:.3px}
.pool-big{font-size:22px;font-weight:700;color:var(--gold);font-family:var(--font-display)}
.pool-ctrl{display:flex;align-items:center;gap:5px}

/* ── Buttons ── */
.step-btn{
  background:linear-gradient(180deg,var(--surf3) 0%,var(--surf2) 100%);
  border:1px solid var(--bord2);color:var(--txt);
  width:36px;height:36px;border-radius:var(--rs);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.step-btn:active{opacity:.7;transform:scale(.95)}
.btn{border:none;border-radius:var(--rs);cursor:pointer;font-size:15px;padding:12px 18px;font-weight:600;width:100%;font-family:var(--font-display);letter-spacing:.3px;transition:all .15s}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-g{
  background:linear-gradient(180deg,var(--gold2) 0%,var(--gold) 100%);
  color:#0d0a03;
  box-shadow:0 2px 8px rgba(212,168,75,.3);
}
.btn-s{background:var(--surf2);color:var(--txt);border:1px solid var(--bord2)}
.btn-gh{background:transparent;color:var(--muted);border:1px solid var(--bord)}
.btn-d{background:linear-gradient(180deg,#b03030,var(--red));color:#fff;box-shadow:0 2px 8px rgba(139,32,32,.3)}
.btn-dis{opacity:.3;pointer-events:none}
.btn-lg{padding:16px;font-size:16px;border-radius:var(--r);margin-top:4px}
.sm-btn{
  background:var(--surf2);color:var(--txt);
  border:1px solid var(--bord2);border-radius:var(--rs);
  padding:8px 14px;font-size:12px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-display);letter-spacing:.3px;
}
.sm-btn:active{opacity:.7}

/* ── Bottom nav ── */
.bot-nav{
  display:flex;
  background:linear-gradient(0deg,#0d0a05 0%,#16120d 100%);
  border-top:1px solid var(--bord2);
  flex-shrink:0;
  height:var(--nav-h);
  position:relative;
  z-index:10;
}
.bot-nav::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--bord3),transparent);
}
.bot-btn{
  flex:1;background:none;border:none;color:var(--muted);
  padding:9px 0 13px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:8px;text-transform:uppercase;letter-spacing:.8px;
  transition:color .2s;
  border-top:2px solid transparent;
  font-family:var(--font-display);
}
.bot-btn.active{
  color:var(--gold);
  border-top-color:var(--gold);
}
.bot-btn-icon{font-size:20px;line-height:1}
.bot-btn-sess{color:var(--amber)!important}
.bot-btn-sess.active{color:var(--gold)!important}
.sess-view .hdr{border-top:2px solid var(--amber);border-bottom-color:var(--amber)}
.sess-view .npc-list{background:transparent}

/* ── Scroll body ── */
.scroll-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}

/* ── Home ── */
.home-view{position:relative;overflow:hidden}
.home-hero-img{height:50dvh;flex-shrink:0;position:relative;overflow:hidden;background:var(--surf2)}
.home-hero-img img{width:100%;height:100%;object-fit:cover;object-position:center 60%;display:block}
.home-hero-img.hero-fallback{background:linear-gradient(160deg,#1a1208 0%,#2a1a08 50%,#0d0b07 100%)}
.home-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.85) 100%);
  display:flex;align-items:flex-end;padding:24px 20px;
}
.home-hero-title{
  font-family:var(--font-display);font-size:24px;font-weight:700;
  color:#fff;line-height:1.2;
  text-shadow:0 2px 16px rgba(0,0,0,.9),0 0 40px rgba(212,168,75,.25);
  letter-spacing:.8px;
}
.home-actions-panel{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  background:linear-gradient(180deg,#0d0a05 0%,#070604 100%);
}
.home-deck-row{
  background:linear-gradient(135deg,var(--surf) 0%,var(--surf2) 100%);
  border:1px solid var(--bord2);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
}
.home-deck-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.home-deck-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:var(--font-display)}
.home-deck-val{font-family:var(--font-display);font-size:18px;color:var(--gold);letter-spacing:.3px}
.home-deck-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-body)}
.home-pool-row{
  background:linear-gradient(135deg,var(--surf) 0%,var(--surf2) 100%);
  border:1px solid var(--bord2);border-radius:var(--r);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.home-sess-btn{width:100%}
.stepper-row{display:flex;align-items:center;gap:18px}
.stepper-val{font-size:30px;font-weight:700;color:var(--gold);min-width:36px;text-align:center;font-family:var(--font-display)}
.hint-txt{color:var(--muted);font-size:14px;text-align:center;padding:20px 0;font-family:var(--font-body)}
.sync-strip{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf);border-radius:var(--rs);
  padding:8px 12px;font-size:11px;color:var(--muted);gap:8px;margin-top:auto;
  border:1px solid var(--bord);font-family:var(--font-display);letter-spacing:.2px;
}
.sync-strip span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Builder ── */
.bldr-sub{padding:9px 16px;font-size:12px;color:var(--muted);background:var(--surf);border-bottom:1px solid var(--bord);flex-shrink:0;font-family:var(--font-display);letter-spacing:.3px}
.npc-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start}
.npc-tile{
  background:var(--surf);border:1px solid var(--bord2);
  border-radius:var(--rs);overflow:hidden;cursor:pointer;
  user-select:none;transition:border-color .2s,box-shadow .2s;
  aspect-ratio:1/1;position:relative;
}
.npc-tile.sel{border-color:var(--gold);box-shadow:0 0 10px rgba(212,168,75,.3)}
.npc-tile:active{opacity:.8}
.tile-img-wrap{position:absolute;inset:0;background:var(--surf2)}
.tile-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.tile-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted2);font-family:var(--font-display)}
.tile-name-ov{
  position:absolute;top:0;left:0;right:0;
  padding:5px 6px;
  background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,rgba(0,0,0,0) 100%);
  color:#fff;font-size:10px;font-weight:600;line-height:1.3;z-index:1;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
  font-family:var(--font-display);letter-spacing:.2px;
}
.tile-chk-ov{
  position:absolute;bottom:5px;right:5px;
  background:var(--gold);color:#0d0a03;
  border-radius:50%;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;z-index:1;
}
.tile-body{padding:9px 10px 10px}
.tile-name{font-weight:600;font-size:12px;margin-bottom:2px;color:var(--txt);font-family:var(--font-display)}
.tile-cls{font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.tile-stats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.tile-cnt{font-size:10px;color:var(--muted2)}

/* ── NPC row ── */
.npc-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.npc-row{border-bottom:1px solid var(--bord)}
.npc-row.fuori{opacity:.5;filter:grayscale(.5)}
.npc-row.fuori .nr-name{color:var(--muted)}
.npc-row.morto{opacity:.25;filter:grayscale(1)}
.npc-row.morto .nr-name{color:var(--muted)}

.nr-hdr{
  display:flex;align-items:center;padding:11px 14px;gap:10px;
  cursor:pointer;
  background:linear-gradient(180deg,var(--surf) 0%,#13100a 100%);
  user-select:none;
  transition:background .15s;
}
.nr-hdr:active{background:var(--surf2)}

/* Avatar — clip ottagonale */
.nr-avatar{
  width:48px;height:48px;
  border-radius:9px;overflow:hidden;flex-shrink:0;
  background:var(--surf2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-family:var(--font-display);color:var(--muted);
  border:1px solid var(--bord2);
  position:relative;
}
.nr-avatar::after{
  content:'';position:absolute;inset:0;
  border-radius:9px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.nr-avatar img{width:100%;height:100%;object-fit:cover;display:block}

.nr-info{flex:1;min-width:0}
.nr-row1{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.nr-star{color:var(--gold);font-size:13px}
.nr-name{font-weight:600;font-size:15px;font-family:var(--font-display);letter-spacing:.2px}
.nr-row2{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

.ca-badge{
  font-size:10px;font-weight:700;
  background:linear-gradient(135deg,#1a140a,var(--surf3));
  border:1px solid var(--bord3);border-radius:5px;
  padding:3px 8px;color:var(--gold);flex-shrink:0;
  font-family:var(--font-display);letter-spacing:.3px;
}

.ts-pill{font-size:9px;padding:2px 7px;border-radius:10px;white-space:nowrap;font-family:var(--font-display);letter-spacing:.2px}
.ts-forte{background:#0a1a0a;color:var(--green3);border:1px solid var(--green2)}
.ts-debole{background:#1a0a0a;color:#d06060;border:1px solid #4a1010}

.nr-right{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nr-expand-btn{
  width:100%;background:var(--surf2);border:none;
  border-top:1px solid var(--bord);color:var(--muted2);
  font-size:10px;padding:5px;text-align:center;cursor:pointer;user-select:none;
  font-family:var(--font-display);letter-spacing:.3px;
}
.nr-expand-btn:active{background:var(--surf3)}

.info-btn{
  background:linear-gradient(135deg,var(--surf3),var(--surf2));
  border:1px solid var(--bord2);color:var(--gold);
  font-size:16px;width:40px;height:40px;
  cursor:pointer;border-radius:9px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.info-btn:active{background:var(--surf3);transform:scale(.95)}

/* Wound bar */
.nr-wound-bar{
  display:flex;align-items:center;
  margin:0 10px 8px;padding:8px 12px;gap:10px;
  background:linear-gradient(135deg,#0d0a06,var(--surf2));
  border-radius:var(--rs);border:1px solid var(--bord);
}
.wounds-row{display:flex;align-items:center;gap:6px;flex:1}
.wd{width:14px;height:14px;border-radius:50%;flex-shrink:0;transition:all .2s}
.wd-on{
  background:radial-gradient(circle at 35% 35%,#ff8080,var(--red2));
  box-shadow:0 0 5px rgba(220,50,50,.5);
}
.wd-off{background:var(--surf3);border:1px solid var(--bord2)}
.wd-btn{
  background:linear-gradient(180deg,#b03030,var(--red));
  color:#fff;border:none;border-radius:var(--rs);
  font-size:13px;font-weight:700;padding:10px 16px;
  cursor:pointer;white-space:nowrap;min-height:40px;flex-shrink:0;
  font-family:var(--font-display);letter-spacing:.3px;
  box-shadow:0 2px 6px rgba(139,32,32,.4);
}
.wd-btn:active{opacity:.8;transform:scale(.97)}
.wd-none{font-size:12px;color:var(--muted);font-style:italic}

/* ── Status chips ── */
.chip{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;font-family:var(--font-display);letter-spacing:.4px}
.chip-indebolito{background:#1e1200;color:var(--amber2);border:1px solid var(--amber)}
.chip-fuori{background:#1e0808;color:#e07070;border:1px solid #6a1010}
.chip-morto{background:#140808;color:#904040;border:1px solid #3a0808}

/* ── Cards panel ── */
.cards-panel{padding:8px 10px 10px;background:rgba(7,6,4,.6);display:flex;flex-direction:column;gap:6px;animation:slide-down .2s ease}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:8px 10px 12px;background:rgba(7,6,4,.6)}

.card-item{
  background:linear-gradient(145deg,var(--surf) 0%,var(--surf2) 100%);
  border:1px solid var(--bord2);border-radius:var(--rs);
  padding:9px 10px;cursor:pointer;user-select:none;
  transition:all .15s;
  display:flex;flex-direction:column;gap:4px;min-height:72px;
  position:relative;overflow:hidden;
}
.card-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
}
.card-item:active{opacity:.7;transform:scale(.98)}
.card-item.star-free{border-color:var(--gold-dim);box-shadow:0 0 8px rgba(212,168,75,.15)}
.card-item.used{opacity:.35}
.card-item.no-pool{opacity:.3}
.card-item.locked{opacity:.2;pointer-events:none}
.ci-top{display:flex;justify-content:space-between;align-items:center}
.ci-title{font-size:13px;font-weight:600;line-height:1.3;flex:1;color:var(--txt);font-family:var(--font-body)}
.ci-grade{margin-top:auto}
.ci-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ci-meta{display:flex;align-items:center;gap:8px}
.use-cnt{font-size:10px;color:var(--muted);font-family:var(--font-display)}

/* ── Grade/stat badges ── */
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;font-family:var(--font-display);letter-spacing:.5px}
.b-c1{background:#1a0808;color:#e06060;border:1px solid #5a1010}
.b-c2{background:#1a1000;color:var(--amber2);border:1px solid #5a3a00}
.b-c3{background:#0a1a0a;color:var(--green3);border:1px solid var(--green2)}
.b-free{background:#1a1200;color:var(--gold);border:1px solid var(--gold-dim)}

/* Grade stat pills */
.sp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:var(--font-display);letter-spacing:.4px}
.g-s{background:#1a0a1a;color:#e080ff;border:1px solid #5a1a7a}
.g-ss{background:#1a0808;color:#ff6060;border:1px solid #7a1010}
.g-a{background:#1a1200;color:var(--gold2);border:1px solid var(--gold-dim)}
.g-b{background:#0a140a;color:#80c880;border:1px solid #1a5a1a}
.g-c{background:#0a0e1a;color:#6090d0;border:1px solid #1a3060}
.g-d{background:#0e0e0e;color:var(--muted);border:1px solid var(--bord2)}

/* ── Consulta tabs ── */
.consulta-tabs{
  display:flex;border-bottom:1px solid var(--bord2);
  background:linear-gradient(180deg,var(--surf) 0%,#13100a 100%);
  flex-shrink:0;
}
.ctab{
  flex:1;background:none;border:none;color:var(--muted);
  font-size:10px;font-family:var(--font-display);letter-spacing:.6px;
  padding:10px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
}
.ctab-active{color:var(--gold);border-bottom-color:var(--gold)}
.ctab:active{background:rgba(255,255,255,.03)}
.almanac{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;gap:8px}

.alm-card{
  background:linear-gradient(145deg,var(--surf) 0%,#13100a 100%);
  border:1px solid var(--bord2);
  border-radius:var(--r);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.alm-open{border-color:var(--bord3)}
.alm-top{display:grid;grid-template-columns:110px 1fr;align-items:start;min-height:110px}
.alm-photo-wrap{width:110px;height:110px;background:var(--surf3);overflow:hidden;border-right:1px solid var(--bord2);border-radius:var(--r) 0 0 0}
.alm-photo{width:110px;height:110px;object-fit:cover;display:block}
.alm-photo-ph{width:110px;height:110px;display:flex;align-items:center;justify-content:center;font-size:28px;font-family:var(--font-display);color:var(--txt);font-weight:600}
.alm-info{padding:8px 12px 8px;display:flex;flex-direction:column;gap:4px;min-width:0}
.alm-name-row{display:flex;align-items:center;gap:5px}
.alm-star{color:var(--gold);font-size:12px;flex-shrink:0}
.alm-name{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:.2px}
.alm-wounds-top{display:none}
.alm-wound-bar{display:flex;gap:10px;margin-top:4px;height:16px}
.alm-wd,.alm-wd-on,.alm-wd-off{flex:1;height:16px;border-radius:5px;transition:background .15s}
.alm-wd-on,.alm-wd-off{cursor:pointer}
.alm-wd-on{background:linear-gradient(90deg,#c02020,var(--red2));box-shadow:inset 0 1px 0 rgba(255,150,150,.2)}
.alm-wd-off{background:var(--surf3)}
.alm-wd-on:active,.alm-wd-off:active{opacity:.7}
.alm-classe{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-display);letter-spacing:.2px}
.alm-stats{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.alm-stat-row{
  display:flex;justify-content:space-between;
  border-top:1px solid var(--bord);padding:6px 8px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.2));
}
.alm-stat-cell{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.alm-stat-icon{font-size:12px;line-height:1}
.alm-stat-name{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-family:var(--font-display)}
.alm-stat-grade{font-size:13px;font-weight:700;font-family:var(--font-display)}
.alm-cards-btn{
  width:100%;background:linear-gradient(180deg,var(--surf2),#0e0c08);
  border:none;border-top:1px solid var(--bord);color:var(--muted);
  font-size:11px;padding:8px 14px;cursor:pointer;text-align:left;
  font-family:var(--font-display);letter-spacing:.4px;
  border-radius:0 0 var(--r) var(--r);
}
.alm-cards-btn:active{background:var(--surf3)}
.alm-cards-drawer{
  background:rgba(7,6,4,.8);border-top:1px solid var(--bord);
  padding:8px 10px;display:flex;flex-direction:column;gap:5px;
  border-radius:0 0 var(--r) var(--r);
}
.alm-card-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;
  background:linear-gradient(135deg,var(--surf) 0%,var(--surf2) 100%);
  border:1px solid var(--bord2);border-radius:var(--rs);cursor:pointer;
  transition:all .15s;
}
.alm-card-row:active{opacity:.7;transform:scale(.99)}
.alm-card-title{font-size:13px;font-weight:600;flex:1;padding-right:8px;line-height:1.3;font-family:var(--font-body)}
.alm-card-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* ── Summon row ── */
.summon-row{border-bottom:1px solid var(--bord);border-left:3px solid var(--teal)}
.summon-row.anim-summon{animation:slide-down .35s ease}
.sp-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.sp-dot-on{background:var(--teal);box-shadow:0 0 5px rgba(42,184,176,.4)}
.sp-dot-off{background:var(--surf3);border:1px solid var(--bord2)}
.sp-dots-row{display:flex;gap:4px;align-items:center}
.summon-slider{display:flex;flex-direction:column;gap:10px;width:100%;padding:10px 0}
.summon-slider-ctrl{display:flex;align-items:center;gap:12px;justify-content:center}
.summon-slider-val{font-size:22px;font-weight:700;color:var(--teal);min-width:32px;text-align:center;font-family:var(--font-display)}
.summon-slider-effect{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);padding:10px 14px;font-size:14px;color:var(--txt);min-height:44px;text-align:center;line-height:1.5;font-family:var(--font-body)}

/* ── Modals ── */
.mod-ov{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mod-sheet{
  background:linear-gradient(170deg,var(--surf) 0%,#0f0c08 100%);
  border-radius:14px;width:min(420px,100%);max-height:90dvh;overflow-y:auto;
  border:1px solid var(--bord3);
  box-shadow:0 8px 40px rgba(0,0,0,.8),0 0 0 1px rgba(212,168,75,.08);
}
.mod-sheet.anim-card-flip{animation:card-flip .4s cubic-bezier(.2,.8,.3,1) both}
.mod-ov.mod-bottom{align-items:flex-end;padding:0;padding-bottom:0;}
.mod-sheet.mod-sheet-bottom{
  border-radius:var(--r2) var(--r2) 0 0;width:100%;
  max-height:calc(100dvh - var(--nav-h));
  border:none;border-top:1px solid var(--bord2);box-shadow:0 -4px 24px rgba(0,0,0,.6);
}
.mod-sheet.mod-sheet-bottom.anim-slide-up{animation:slide-up-sheet .28s ease}
.mod-img-wrap{display:flex;justify-content:center;padding:22px 20px 0}
.mod-img{width:120px;height:120px;object-fit:cover;border-radius:12px;border:2px solid var(--gold);display:block;box-shadow:0 0 20px rgba(212,168,75,.2)}
.mod-img-ph{width:120px;height:120px;background:var(--surf2);border-radius:12px;border:2px solid var(--bord2);display:flex;align-items:center;justify-content:center;font-size:38px;font-family:var(--font-display);color:var(--muted2)}
.mod-body{padding:16px 20px 32px}
.mod-npc{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-family:var(--font-display)}
.mod-title{font-family:var(--font-display);font-size:22px;color:var(--gold);margin-bottom:12px;line-height:1.2;letter-spacing:.4px}
.mod-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mod-free{font-size:11px;color:var(--gold);background:#1a1200;border:1px solid var(--gold-dim);padding:3px 10px;border-radius:10px;font-family:var(--font-display);letter-spacing:.3px}
.mod-cost{font-size:13px;color:var(--muted);font-family:var(--font-display)}
.mod-readonly{font-size:10px;color:var(--muted);background:var(--surf2);border:1px solid var(--bord);padding:2px 9px;border-radius:10px;font-family:var(--font-display);letter-spacing:.3px}
.mod-desc{font-size:16px;line-height:1.7;color:var(--txt);margin-bottom:14px;font-family:var(--font-body)}
.mod-rule{font-size:14px;color:var(--muted);font-style:italic;border-top:1px solid var(--bord);padding-top:10px;margin-bottom:10px;line-height:1.6;font-family:var(--font-body)}
.mod-flavor{font-size:14px;color:#9a8060;font-style:italic;border-top:1px solid var(--bord);padding-top:10px;margin-bottom:10px;line-height:1.6;font-family:var(--font-body)}
.mod-minion{font-size:13px;color:#5a9acf;background:#060e18;border:1px solid #1a3048;border-radius:6px;padding:8px 10px;margin-bottom:10px;line-height:1.5;font-family:var(--font-body)}
.mod-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}

/* Info modal */
.info-img-wrap{display:flex;justify-content:center;padding:22px 20px 0}
.info-img{width:min(100%,380px);aspect-ratio:1/1;object-fit:cover;border-radius:14px;border:2px solid var(--gold);display:block;box-shadow:0 0 30px rgba(212,168,75,.15)}
.info-img-ph{width:min(100%,380px);aspect-ratio:1/1;background:var(--surf2);border-radius:14px;border:2px solid var(--bord2);display:flex;align-items:center;justify-content:center;font-size:56px;font-family:var(--font-display);color:var(--muted2)}
.info-body{padding:16px 20px 32px}
.info-name{font-family:var(--font-display);font-size:22px;color:var(--gold);margin-bottom:2px;letter-spacing:.4px}
.info-cls{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:var(--font-display);letter-spacing:.3px}
.info-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.info-section{margin-bottom:14px}
.info-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);margin-bottom:6px;font-family:var(--font-display)}
.info-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.info-stat{
  background:linear-gradient(145deg,var(--surf2),#0e0c08);
  border-radius:var(--rs);padding:10px 8px;text-align:center;
  border:1px solid var(--bord);
}
.info-stat-icon{font-size:16px;display:block;margin-bottom:3px}
.info-stat-grade{font-size:15px;font-weight:700;display:block;font-family:var(--font-display)}
.info-stat-name{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;font-family:var(--font-display)}
.wounds-ctrl{display:flex;align-items:center;gap:10px}
.wounds-dots-lg{display:flex;gap:7px}
.wd-lg{width:18px;height:18px;border-radius:50%;transition:all .2s}
.wd-lg-on{background:radial-gradient(circle at 35% 35%,#ff8080,var(--red2));box-shadow:0 0 6px rgba(220,50,50,.4)}
.wd-lg-off{background:var(--surf2);border:2px solid var(--bord)}

/* ── Menu / overlay ── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
.menu-sheet{
  background:linear-gradient(180deg,var(--surf) 0%,#0f0c08 100%);
  width:100%;border-radius:var(--r) var(--r) 0 0;
  padding:8px 0 28px;border-top:1px solid var(--bord2);
}
.menu-item{display:block;width:100%;background:none;border:none;color:var(--txt);font-size:15px;padding:16px 24px;cursor:pointer;text-align:left;font-family:var(--font-body)}
.menu-item:active{background:var(--surf2)}
.menu-cancel{color:var(--muted)}
.menu-sep{border:none;border-top:1px solid var(--bord);margin:4px 0}

/* ── Minion rules ── */
.minion-body{padding:20px 20px 36px}
.minion-title{font-family:var(--font-display);font-size:18px;color:var(--gold);margin-bottom:14px;letter-spacing:.4px}
.mr{margin-bottom:10px;padding:10px 13px;background:linear-gradient(135deg,var(--surf2),#0e0c08);border-radius:var(--rs);border-left:2px solid var(--gold-dim)}
.mr-t{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:3px;font-family:var(--font-display);letter-spacing:.3px}
.mr-b{font-size:14px;color:var(--muted);line-height:1.6;font-family:var(--font-body)}

/* ── Dialog ── */
.dlg-ov{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:400;padding:20px}
.dlg-box{
  background:linear-gradient(170deg,var(--surf) 0%,#0f0c08 100%);
  border:1px solid var(--bord3);border-radius:var(--r2);
  padding:24px 20px;width:100%;max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
}
.dlg-title{font-family:var(--font-display);font-size:18px;color:var(--gold);margin-bottom:8px;letter-spacing:.4px}
.dlg-msg{font-size:15px;color:var(--muted);line-height:1.6;margin-bottom:20px;font-family:var(--font-body)}
.dlg-btns{display:flex;flex-direction:column;gap:10px}

/* ── Settings ── */
.settings-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.settings-section{
  background:linear-gradient(145deg,var(--surf) 0%,#13100a 100%);
  border:1px solid var(--bord2);border-radius:var(--r);
  padding:14px 16px;display:flex;flex-direction:column;gap:10px;
}
.settings-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);font-weight:600;font-family:var(--font-display)}
.divider{border:none;border-top:1px solid var(--bord)}
.sync-info{font-size:11px;color:var(--muted);text-align:center;font-family:var(--font-display);letter-spacing:.2px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:var(--font-display)}
.fld input{background:var(--surf2);border:1px solid var(--bord2);color:var(--txt);border-radius:var(--rs);padding:12px 14px;font-size:13px;outline:none;font-family:monospace}
.fld input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 2px rgba(212,168,75,.1)}
.hint-box{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r);padding:16px;font-size:12px;color:var(--muted);line-height:2}
.hint-box strong{color:var(--txt);display:block}
.hint-box code{display:block;font-family:monospace;background:var(--bg);padding:5px 8px;border-radius:4px;margin:2px 0 8px;overflow-x:auto;white-space:nowrap;font-size:11px;color:#9a8a70}

/* ── Toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--surf2),#0f0c08);
  color:var(--txt);padding:10px 22px;border-radius:20px;
  font-size:13px;border:1px solid var(--bord2);
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  z-index:500;white-space:nowrap;max-width:92vw;text-align:center;
  pointer-events:none;animation:slide-up-toast .25s ease;
  font-family:var(--font-body);
}
.toast-err{background:linear-gradient(135deg,#2a0808,#1a0404);border-color:var(--red);color:#ff9090}

/* ── Misc ── */
.loading{text-align:center;padding:20px;color:var(--gold);font-size:14px;font-family:var(--font-display);letter-spacing:.3px}
.err-banner{background:#180808;border:1px solid var(--red);color:#ff9090;border-radius:var(--rs);padding:10px 14px;font-size:13px;font-family:var(--font-body)}

/* ── Animations ── */
.cards-panel.anim-open{animation:slide-down .22s ease}
.mod-sheet.mod-sheet-bottom.anim-slide-up{animation:slide-up-sheet .28s ease}

@keyframes slide-down{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-up-sheet{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-up-toast{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes wound-flash{0%{background:rgba(220,50,50,0)}20%{background:rgba(220,50,50,.45)}100%{background:rgba(220,50,50,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes card-flip{0%{opacity:0;transform:perspective(900px) rotateY(-90deg) scale(.9)}55%{opacity:1;transform:perspective(900px) rotateY(6deg) scale(1.02)}75%{transform:perspective(900px) rotateY(-2deg) scale(.99)}100%{opacity:1;transform:perspective(900px) rotateY(0deg) scale(1)}}


</style>
</head>
<body>
<div id="app"></div>
<div id="modals"></div>
<script src="app.js"></script>
</body>
</html>
